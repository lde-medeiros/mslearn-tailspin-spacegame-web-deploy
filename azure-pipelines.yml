# PRO690-Multistage-SelfHosted-and-Hosted.yaml

name: PRO690-Multistage-SelfHosted-and-Hosted

trigger:
- '*'

variables:
  buildConfiguration: 'Release'
  releaseBranchName: 'release'

stages:
# ==========================
# Build stage (self-hosted)
# ==========================
- stage: 'Build'
  displayName: 'Build on self-hosted agent'
  jobs:
  - job: 'Build_SelfHosted'
    displayName: 'Build job (SelfHostedPRO690)'
    pool:
      name: 'SelfHostedPRO690'
      demands:
      - npm

    variables:
      wwwrootDir: 'Tailspin.SpaceGame.Web/wwwroot'
      dotnetSdkVersion: '8.x'

    steps:
    - task: UseDotNet@2
      displayName: 'Use .NET SDK $(dotnetSdkVersion) on self-hosted agent'
      inputs:
        version: '$(dotnetSdkVersion)'

    - task: NodeTool@0
      displayName: 'Use Node 18.x on self-hosted agent'
      inputs:
        versionSpec: '18.x'

    - task: Npm@1
      displayName: 'Run npm install'
      inputs:
        verbose: false

    - script: './node_modules/.bin/node-sass $(wwwrootDir) --output $(wwwrootDir)'
      displayName: 'Compile Sass assets'

    - task: gulp@1
      displayName: 'Run gulp tasks on self-hosted agent'

    - script: 'echo "$(Build.DefinitionName), $(Build.BuildId), $(Build.BuildNumber)" > buildinfo.txt'
      displayName: 'Write build info'
      workingDirectory: $(wwwrootDir)

    - task: DotNetCoreCLI@2
      displayName: 'Build the project - $(buildConfiguration)'
      inputs:
        command: 'build'
        arguments: '--no-restore --configuration $(buildConfiguration)'
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Publish the project - $(buildConfiguration)'
      inputs:
        command: 'publish'
        projects: '**/*.csproj'
        publishWebProjects: false
        arguments: '--no-build --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/$(buildConfiguration)'
        zipAfterPublish: true

    - publish: '$(Build.ArtifactStagingDirectory)'
      artifact: drop

# ==========================
# Test stage (self-hosted)
# ==========================
- stage: 'Test'
  displayName: 'Test on self-hosted agent'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: 'Test_SelfHosted'
    displayName: 'Test job (SelfHostedPRO690)'
    pool:
      name: 'SelfHostedPRO690'

    steps:
    - task: UseDotNet@2
      displayName: 'Use .NET SDK 8.x for tests on self-hosted agent'
      inputs:
        version: '8.x'

    - download: current
      artifact: drop

    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: 'test'
        projects: '**/*Tests.csproj'

# ==========================
# Dev stage (Microsoft-hosted)
# ==========================
- stage: 'Dev'
  displayName: 'Deploy to dev on Microsoft-hosted agent'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - deployment: Deploy_Dev_Hosted
    displayName: 'Dev deploy job (Microsoft-hosted Ubuntu)'
    pool:
      vmImage: 'ubuntu-22.04'
    environment: dev
    variables:
    - group: Release
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: 'Azure App Service Deploy: dev website (hosted agent)'
            inputs:
              azureSubscription: 'Azure-for-Students-Lucas'
              appType: 'webAppLinux'
              appName: '$(WebAppNameDev)'
              package: '$(Pipeline.Workspace)/drop/$(buildConfiguration)/*.zip'