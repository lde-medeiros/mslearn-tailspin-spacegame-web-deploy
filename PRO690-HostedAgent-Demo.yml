# PRO690-HostedAgent-Demo.yaml

name: PRO690-HostedAgent-Demo

trigger:
- main    

pool:
  name: 'Azure Pipelines'             # Microsoft-hosted pool
  vmImage: 'ubuntu-22.04'   # hosted Ubuntu image

jobs:
- job: LongRunningDemo
  timeoutInMinutes: 5          # job can run up to 5 minutes
  steps:
  - script: |
      echo "Starting PRO690 hosted-agent demo..."
      uname -a
      echo "Sleeping for 40 seconds so we can watch the agent state..."
      sleep 40
      echo "Demo complete."
    displayName: 'Keep agent busy for 40 seconds'